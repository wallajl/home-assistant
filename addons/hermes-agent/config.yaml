name: Hermes Agent
version: "0.1.0"
slug: hermes_agent
description: Hermes Agent running inside Home Assistant with browser terminal access
url: https://github.com/wallajl/home-assistant/tree/main/addons/hermes-agent
arch:
  - amd64
  - aarch64
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: mdi:message-processing-outline
panel_title: Hermes
map:
  - config:rw
  - share:rw
  - media:rw
  - ssl:ro
options:
  start_gateway: false
  gateway_allow_all_users: false
  hass_url: http://homeassistant.local:8123
  hass_token: ""
  telegram_bot_token: ""
  telegram_allowed_users: ""
schema:
  start_gateway: bool
  gateway_allow_all_users: bool
  hass_url: str
  hass_token: password?
  telegram_bot_token: password?
  telegram_allowed_users: str?
