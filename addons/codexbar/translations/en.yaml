configuration:
  codexbar_version:
    name: CodexBar version
    description: Upstream CodexBar CLI release version, without the leading v.
  refresh_interval:
    name: Refresh interval
    description: Seconds between CodexBar's internal provider refreshes. Use 0 to refresh on every request.
  history_interval:
    name: History sampling interval
    description: Seconds between background Codex and Claude trend samples. Defaults to five minutes.
  request_timeout:
    name: Request timeout
    description: Provider request timeout in seconds.
  log_level:
    name: Log level
    description: CodexBar CLI log verbosity.
