configuration:
  codexbar_version:
    name: CodexBar version
    description: Upstream CodexBar CLI release version, without the leading v.
  refresh_interval:
    name: Refresh interval
    description: Usage response cache time in seconds. Set 0 to disable caching.
  request_timeout:
    name: Request timeout
    description: Provider request timeout in seconds. Set 0 to wait indefinitely.
  log_level:
    name: Log level
    description: CodexBar CLI log verbosity.
