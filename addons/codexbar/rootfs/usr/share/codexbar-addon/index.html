<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CodexBar</title>
  <style>
    :root { color-scheme: dark; --bg:#09090b; --card:#14141a; --muted:#a1a1aa; --fg:#f4f4f5; --line:#27272f; --ok:#16d3b4; --bad:#fb7185; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: radial-gradient(circle at 20% 0%, #18233b 0, transparent 35%), var(--bg); color:var(--fg); }
    main { max-width: 1120px; margin: 0 auto; padding: 28px 18px 56px; }
    header { display:flex; align-items:flex-end; justify-content:space-between; gap: 16px; margin-bottom: 22px; }
    h1 { margin:0; font-size: clamp(30px, 6vw, 56px); letter-spacing:-0.06em; }
    .sub { color:var(--muted); margin-top:6px; }
    button, select { background:#1f2937; color:var(--fg); border:1px solid #334155; border-radius: 12px; padding: 10px 12px; font-weight: 650; }
    .controls { display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap:14px; }
    .card { background: color-mix(in srgb, var(--card) 92%, transparent); border:1px solid var(--line); border-radius: 22px; padding: 18px; box-shadow: 0 20px 60px #0008; }
    .card h2 { margin:0 0 10px; font-size:20px; display:flex; align-items:center; justify-content:space-between; gap:8px; text-transform: capitalize; }
    .pill { font-size:12px; color:#061512; background:var(--ok); border-radius:999px; padding:4px 8px; text-transform:none; }
    .muted { color:var(--muted); }
    .bar { height: 12px; background:#27272f; border-radius:999px; overflow:hidden; margin: 8px 0 4px; }
    .fill { height:100%; background:linear-gradient(90deg, var(--ok), #60a5fa); border-radius:inherit; }
    dl { display:grid; grid-template-columns: 1fr auto; gap: 8px 12px; margin: 12px 0 0; }
    dt { color:var(--muted); } dd { margin:0; text-align:right; font-variant-numeric: tabular-nums; }
    pre { white-space: pre-wrap; overflow:auto; max-height:420px; background:#050507; border:1px solid var(--line); border-radius:18px; padding:14px; }
    .error { border-color: color-mix(in srgb, var(--bad) 60%, var(--line)); }
    .footer { margin-top: 16px; color:var(--muted); font-size: 13px; }
    a { color:#67e8f9; }
  </style>
</head>
<body>
<main>
  <header>
    <div>
      <h1>CodexBar</h1>
      <div class="sub">AI coding usage, quotas, resets and local cost snapshots inside Home Assistant.</div>
    </div>
    <div class="controls">
      <select id="provider">
        <option value="all">all providers</option>
        <option value="both">codex + claude</option>
        <option value="codex">codex</option>
        <option value="claude">claude</option>
        <option value="openai">openai</option>
      </select>
      <button id="refresh">Refresh</button>
    </div>
  </header>
  <section id="status" class="card muted">Loading…</section>
  <h2>Usage</h2>
  <section id="usage" class="grid"></section>
  <h2>Cost</h2>
  <section id="cost" class="grid"></section>
  <div class="footer">Configure providers by editing add-on option <code>provider_config_json</code> or the persistent file <code>/addon_configs/&lt;repo&gt;_codexbar/codexbar/config.json</code>.</div>
</main>
<script>
const $ = (id) => document.getElementById(id);
const fmtDate = (value) => value ? new Date(value).toLocaleString() : '—';
const pct = (value) => Number.isFinite(value) ? Math.max(0, Math.min(100, value)) : 0;
const money = (value) => Number.isFinite(value) ? '$' + value.toFixed(2) : '—';
function asArray(payload) { return Array.isArray(payload) ? payload : [payload]; }
function providerName(p) { return (p.provider || p.providerID || 'provider').replaceAll('_', ' '); }
function windowBlock(label, win) {
  if (!win) return '';
  const used = Number(win.usedPercent);
  const remaining = Number.isFinite(used) ? 100 - used : Number(win.remainingPercent);
  const shown = Number.isFinite(remaining) ? remaining : 0;
  return `<dt>${label}</dt><dd>${Math.round(shown)}% left</dd><dt></dt><dd><div class="bar"><div class="fill" style="width:${pct(shown)}%"></div></div></dd><dt>Reset</dt><dd>${fmtDate(win.resetsAt)}</dd>`;
}
function usageCard(p) {
  if (p.error) return `<article class="card error"><h2>${providerName(p)}</h2><p>${p.error.message || JSON.stringify(p.error)}</p></article>`;
  const usage = p.usage || {};
  const identity = usage.identity || {};
  return `<article class="card"><h2><span>${providerName(p)}</span><span class="pill">${p.source || 'source'}</span></h2><dl>
    ${windowBlock('Session', usage.primary)}${windowBlock('Weekly', usage.secondary)}${windowBlock('Monthly', usage.tertiary)}
    <dt>Account</dt><dd>${usage.accountEmail || identity.accountEmail || p.account || '—'}</dd>
    <dt>Updated</dt><dd>${fmtDate(usage.updatedAt || p.updatedAt)}</dd>
  </dl></article>`;
}
function costCard(p) {
  if (p.error) return `<article class="card error"><h2>${providerName(p)}</h2><p>${p.error.message || JSON.stringify(p.error)}</p></article>`;
  const totals = p.totals || {};
  return `<article class="card"><h2><span>${providerName(p)}</span><span class="pill">cost</span></h2><dl>
    <dt>Session</dt><dd>${money(Number(p.sessionCostUSD))}</dd>
    <dt>Last 30 days</dt><dd>${money(Number(p.last30DaysCostUSD ?? totals.totalCost))}</dd>
    <dt>Tokens</dt><dd>${Number(totals.totalTokens || p.last30DaysTokens || 0).toLocaleString()}</dd>
    <dt>Updated</dt><dd>${fmtDate(p.updatedAt)}</dd>
  </dl></article>`;
}
async function load() {
  $('status').textContent = 'Refreshing…';
  const provider = $('provider').value;
  const costProvider = ['codex', 'claude', 'both'].includes(provider) ? provider : 'both';
  try {
    const [health, usage, cost] = await Promise.all([
      fetch('health').then(r => r.json()),
      fetch(`usage?provider=${encodeURIComponent(provider)}`).then(r => r.json()),
      fetch(`cost?provider=${encodeURIComponent(costProvider)}`).then(r => r.json()).catch(e => ({error: String(e)}))
    ]);
    $('status').innerHTML = `API healthy${health.version ? ` · CodexBar ${health.version}` : ''} · ${new Date().toLocaleTimeString()}`;
    $('usage').innerHTML = asArray(usage).map(usageCard).join('') || '<p class="muted">No usage payload.</p>';
    $('cost').innerHTML = cost.error ? `<article class="card error"><pre>${cost.error}</pre></article>` : asArray(cost).map(costCard).join('');
  } catch (e) {
    $('status').innerHTML = `<strong>Failed:</strong> ${e.message}`;
    $('usage').innerHTML = '';
    $('cost').innerHTML = '';
  }
}
$('refresh').addEventListener('click', load);
$('provider').addEventListener('change', load);
load();
setInterval(load, 60000);
</script>
</body>
</html>
