server {
    listen 8099 default_server;
    server_name _;

    # Home Assistant ingress is the intended access path. Requests from other
    # add-ons on the Supervisor network are not accepted.
    allow 172.30.32.2;
    allow 127.0.0.1;
    deny all;

    root /usr/share/codexbar-addon;
    index index.html;

    location = /health {
        proxy_pass http://127.0.0.1:8080/health;
        proxy_set_header Host 127.0.0.1:8080;
        proxy_set_header Connection "";
    }

    location ~ ^/(usage|cost)$ {
        proxy_pass http://127.0.0.1:8080$request_uri;
        proxy_set_header Host 127.0.0.1:8080;
        proxy_set_header Connection "";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
